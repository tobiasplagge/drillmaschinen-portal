<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Trip {{ trip.id }}</title>
  </head>
  <body>
    <h1>Trip {{ trip.id }}</h1>
    <p><b>Device:</b> {{ trip.device_id }} — <b>Trip ID:</b> {{ trip.trip_id }}</p>
    <h2>Metadata</h2>
    <pre>{{ metadata | tojson(indent=2) }}</pre>
    <h2>Files</h2>
    <ul>
    {% for f in files %}
      <li><a href="/uploads/{{ f }}">{{ f }}</a></li>
    {% endfor %}
    </ul>
    <p><a href="/">Back</a></p>
  </body>
</html>
